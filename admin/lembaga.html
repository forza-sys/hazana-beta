<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Lembaga - HAZANA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/erp.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <div id="sidebar-container"></div>
        
        <main class="main-content expanded">
            <div class="app-container">
                
                <!-- Top Navigation -->
                <nav class="top-nav">
                    <div class="page-title">
                        <h1>Database Lembaga</h1>
                        <p>Kelola data master lembaga seluruh Indonesia.</p>
                    </div>
                    <div class="user-actions">
                        <div class="user-profile">
                            <div class="user-avatar"><i class="fas fa-user-shield"></i></div>
                            <div class="user-info">
                                <span class="name" id="user-name">Loading...</span>
                                <span class="email" id="user-role">...</span>
                            </div>
                        </div>
                    </div>
                </nav>

                <!-- Stats Grid -->
                <div class="grid">
                    <div class="card">
                        <div class="card-title">Total Lembaga Terdata</div>
                        <div class="card-value" id="stat-total-lembaga">0</div>
                        <i class="fas fa-building card-icon"></i>
                    </div>
                    <div class="card">
                        <div class="card-title">Anggota FOZ</div>
                        <div class="card-value" id="stat-anggota-foz" style="color: var(--success);">0</div>
                        <i class="fas fa-id-badge card-icon"></i>
                    </div>
                    <div class="card">
                        <div class="card-title">Belum Anggota</div>
                        <div class="card-value" id="stat-non-anggota" style="color: var(--text-muted);">0</div>
                        <i class="fas fa-user-clock card-icon"></i>
                    </div>
                </div>

                <!-- Table -->
                <div class="table-container">
                    <div class="table-header">
                        <h3>Daftar Lembaga</h3>
                        <div style="display: flex; gap: 1rem; align-items: center;">
                            <input type="text" id="search-lembaga" class="form-control" placeholder="Cari nama lembaga..." style="min-width: 250px;">
                            <button class="btn btn-primary" onclick="openLembagaModal()"><i class="fas fa-plus"></i> Tambah Lembaga</button>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>NAMA LEMBAGA</th>
                                <th>JENIS LEMBAGA</th>
                                <th>SKALA</th>
                                <th>STATUS ANGGOTA</th>
                                <th>AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="lembaga-table-body">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 2rem;">Memuat data lembaga...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <!-- Modal Form Tambah/Edit -->
    <div id="lembaga-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Tambah Lembaga Baru</h2>
                <button class="close-modal" onclick="closeLembagaModal()">&times;</button>
            </div>
            <form id="lembaga-form" onsubmit="saveLembaga(event)">
                <input type="hidden" id="lembaga-id">
                <div class="form-group">
                    <label>Nama Lembaga</label>
                    <input type="text" id="nama_lembaga" class="form-control" required placeholder="Contoh: Dompet Dhuafa">
                </div>
                <div class="form-group">
                    <label>Jenis Lembaga</label>
                    <select id="jenis_lembaga" class="form-control" required>
                        <option value="">-- Pilih Jenis --</option>
                        <option value="BAZ">BAZ</option>
                        <option value="LAZ">LAZ</option>
                        <option value="UPZ">UPZ</option>
                        <option value="MPZ">MPZ</option>
                        <option value="NON_OPZ">Non-OPZ</option>
                        <option value="Asosiasi">Asosiasi</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Skala</label>
                    <select id="tipe_lembaga" class="form-control" required>
                        <option value="">-- Pilih Skala --</option>
                        <option value="Nasional">Nasional</option>
                        <option value="Provinsi">Provinsi</option>
                        <option value="Kab/Kota">Kab/Kota</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status Keanggotaan</label>
                    <select id="is_foz_member" class="form-control" required>
                        <option value="true">Anggota</option>
                        <option value="false">Belum Anggota</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn" onclick="closeLembagaModal()">Batal</button>
                    <button type="submit" class="btn btn-primary" id="btn-save">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="js/lembaga.js"></script>
</body>
</html>
