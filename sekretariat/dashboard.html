<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sekretariat FOZ - HAZANA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/erp.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <div id="sidebar-container"></div>
        
        <main class="main-content expanded">
            <div class="app-container">
                
                <!-- Top Navigation -->
                <nav class="top-nav">
                    <div class="page-title">
                        <h1>Verifikasi Keanggotaan FOZ</h1>
                        <p>Tetapkan status keanggotaan Forum Zakat untuk setiap lembaga yang terdaftar di database.</p>
                    </div>
                    <div class="user-actions">
                        <div class="user-profile">
                            <div class="user-avatar"><i class="fas fa-id-card"></i></div>
                            <div class="user-info">
                                <span class="name" id="user-name">Loading...</span>
                                <span class="email" id="user-role">...</span>
                            </div>
                        </div>
                    </div>
                </nav>

                <!-- Stats Grid -->
                <div class="grid">
                    <div class="card">
                        <div class="card-title">Total Lembaga Terdata</div>
                        <div class="card-value" id="stat-total-lembaga">0</div>
                        <i class="fas fa-building card-icon"></i>
                    </div>
                    <div class="card">
                        <div class="card-title">Anggota FOZ</div>
                        <div class="card-value" id="stat-anggota-foz" style="color: var(--success);">0</div>
                        <i class="fas fa-id-badge card-icon"></i>
                    </div>
                    <div class="card">
                        <div class="card-title">Belum Anggota</div>
                        <div class="card-value" id="stat-non-anggota" style="color: var(--text-muted);">0</div>
                        <i class="fas fa-user-clock card-icon"></i>
                    </div>
                </div>

                <!-- Table -->
                <div class="table-container">
                    <div class="table-header">
                        <h3>Daftar Lembaga Zakat</h3>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>NAMA LEMBAGA & SK</th>
                                <th>TINGKAT</th>
                                <th>WILAYAH KERJA</th>
                                <th>STATUS FOZ</th>
                                <th>AKSI (TOGGLE)</th>
                            </tr>
                        </thead>
                        <tbody id="lembaga-table-body">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 2rem;">Memuat data lembaga...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="js/sekretariat-core.js"></script>
</body>
</html>
