<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Karantina - HAZANA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/erp.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <style>
        .mapping-select { width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.875rem; }
        .row-action { display: flex; gap: 0.5rem; }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <div id="sidebar-container"></div>
        
        <main class="main-content expanded">
            <div class="app-container">
                
                <!-- Top Navigation -->
                <nav class="top-nav">
                    <div class="page-title">
                        <h1>Karantina Data (Mapping Alias)</h1>
                        <p>Petakan nama-nama asing dari file Excel BAZNAS/SIMZAT ke Buku Induk Lembaga agar data ZIS menyatu.</p>
                    </div>
                    <div class="user-actions">
                        <button class="btn btn-primary" onclick="simulateUpload()"><i class="fas fa-upload"></i> Simulasi Upload BAZNAS</button>
                        <div class="user-profile">
                            <div class="user-avatar"><i class="fas fa-user-tie"></i></div>
                            <div class="user-info">
                                <span class="name" id="user-name">Memuat...</span>
                                <span class="email" id="user-role">Eksekutor FOZ</span>
                            </div>
                        </div>
                    </div>
                </nav>

                <!-- Mapping Table -->
                <div class="table-container">
                    <div class="table-header">
                        <h3 style="color: var(--danger);"><i class="fas fa-exclamation-circle"></i> Menunggu Pemetaan Manual</h3>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Nama Asing (Raw Name)</th>
                                <th>Sumber Data</th>
                                <th>Petakan ke Buku Induk (Master)</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="karantina-table-body">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 2rem;">Tidak ada data di karantina. Semua bersih! ✨</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="js/executive-core.js"></script>
</body>
</html>
